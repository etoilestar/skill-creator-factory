<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Creator Platform</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f0f2f5; color: #333; min-height: 100vh; }
  .app { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }

  /* Progress bar */
  .phases { display: flex; gap: 4px; margin-bottom: 28px; }
  .phase-item { flex: 1; text-align: center; }
  .phase-dot { width: 32px; height: 32px; border-radius: 50%;
               display: flex; align-items: center; justify-content: center;
               margin: 0 auto 4px; font-weight: 700; font-size: 0.85rem;
               border: 2px solid #ddd; background: #fff; color: #999; transition: all .3s; }
  .phase-dot.active { border-color: #4f46e5; background: #4f46e5; color: #fff; }
  .phase-dot.done { border-color: #22c55e; background: #22c55e; color: #fff; }
  .phase-label { font-size: 0.72rem; color: #888; }

  /* Chat area */
  .chat-box { background: #fff; border-radius: 16px; padding: 20px;
              min-height: 300px; max-height: 480px; overflow-y: auto;
              margin-bottom: 16px; border: 1px solid #e5e7eb; }
  .msg { margin-bottom: 14px; display: flex; flex-direction: column; }
  .msg.bot { align-items: flex-start; }
  .msg.user { align-items: flex-end; }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px;
            line-height: 1.5; font-size: 0.95rem; }
  .bot .bubble { background: #f3f4f6; color: #333; border-bottom-left-radius: 4px; }
  .user .bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
  .meta { font-size: 0.72rem; color: #aaa; margin-top: 3px; }

  /* Options */
  .options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .opt-btn { padding: 8px 16px; border: 1.5px solid #4f46e5; border-radius: 8px;
             background: #fff; color: #4f46e5; cursor: pointer; font-size: 0.88rem;
             transition: all .2s; }
  .opt-btn:hover { background: #4f46e5; color: #fff; }

  /* Input row */
  .input-row { display: flex; gap: 8px; }
  #userInput { flex: 1; padding: 10px 14px; border: 1.5px solid #ddd;
               border-radius: 10px; font-size: 0.95rem; outline: none; }
  #userInput:focus { border-color: #4f46e5; }
  .send-btn { padding: 10px 20px; background: #4f46e5; color: #fff;
              border: none; border-radius: 10px; cursor: pointer; font-size: 0.95rem;
              font-weight: 600; }
  .send-btn:hover { background: #4338ca; }
  .send-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

  /* Action buttons */
  .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .action-btn { padding: 10px 22px; border: none; border-radius: 10px;
                cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all .2s; }
  .generate-btn { background: #059669; color: #fff; }
  .generate-btn:hover { background: #047857; }
  .generate-btn:disabled { background: #6ee7b7; cursor: not-allowed; }
  .download-btn { background: #0891b2; color: #fff; display: none; }
  .download-btn:hover { background: #0e7490; }

  /* Error */
  .error-msg { color: #dc2626; font-size: 0.85rem; margin-top: 6px; display: none; }

  /* Status bar */
  .status-bar { font-size: 0.78rem; color: #888; margin-top: 10px; }
</style>
</head>
<body>
<div class="app">
  <h1>🧩 Skill Creator Platform</h1>
  <p class="subtitle">通过引导对话，一步步创建你的 Claude Skill</p>

  <!-- Phase progress -->
  <div class="phases" id="phases">
    <div class="phase-item"><div class="phase-dot active" id="dot-1">1</div><div class="phase-label">需求挖掘</div></div>
    <div class="phase-item"><div class="phase-dot" id="dot-2">2</div><div class="phase-label">架构蓝图</div></div>
    <div class="phase-item"><div class="phase-dot" id="dot-3">3</div><div class="phase-label">工程实现</div></div>
    <div class="phase-item"><div class="phase-dot" id="dot-4">4</div><div class="phase-label">测试迭代</div></div>
    <div class="phase-item"><div class="phase-dot" id="dot-5">5</div><div class="phase-label">打包分发</div></div>
  </div>

  <!-- Chat messages -->
  <div class="chat-box" id="chatBox"></div>

  <!-- Option buttons -->
  <div class="options" id="optionArea"></div>

  <!-- Text input -->
  <div class="input-row">
    <input type="text" id="userInput" placeholder="输入你的回答，或点击上方选项..." />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>

  <!-- Action buttons -->
  <div class="actions">
    <button class="action-btn generate-btn" id="generateBtn" onclick="generateSkill()" disabled>
      🚀 生成技能文件
    </button>
    <button class="action-btn download-btn" id="downloadBtn" onclick="downloadSkill()">
      📦 下载 ZIP
    </button>
  </div>

  <div class="status-bar" id="statusBar">正在初始化...</div>
</div>

<script>
const API = '';  // same origin
let sessionId = null;
let currentStep = null;
let generatedSkillName = null;

async function init() {
  setStatus('正在连接服务器...');
  try {
    const res = await fetch(`${API}/api/start`, { method: 'POST' });
    const data = await res.json();
    sessionId = data.session_id;
    displayPrompt(data.first_prompt);
    setStatus(`会话已创建: ${sessionId.slice(0,8)}...`);
  } catch(e) {
    setStatus('无法连接到后端服务，请确认后端已启动 (port 8000)');
    addMsg('bot', '⚠️ 无法连接到后端服务。请确认后端已启动在 port 8000。');
  }
}

function displayPrompt(prompt) {
  if (!prompt) return;
  currentStep = prompt;
  addMsg('bot', prompt.question);
  renderOptions(prompt.options || []);
  updatePhases(prompt.phase || 1, prompt.completed);
  if (prompt.completed) {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('userInput').disabled = true;
  }
}

function renderOptions(options) {
  const area = document.getElementById('optionArea');
  area.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      document.getElementById('userInput').value = opt;
      sendMessage();
    };
    area.appendChild(btn);
  });
}

function addMsg(role, text) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function updatePhases(phase, completed) {
  for (let i = 1; i <= 5; i++) {
    const dot = document.getElementById(`dot-${i}`);
    dot.className = 'phase-dot';
    if (completed || i < phase) dot.classList.add('done');
    else if (i === phase) dot.classList.add('active');
  }
}

async function sendMessage() {
  if (!sessionId || !currentStep) return;
  const input = document.getElementById('userInput');
  const value = input.value.trim();
  if (!value) return;

  const fieldName = currentStep.step || 'input';
  addMsg('user', value);
  input.value = '';
  document.getElementById('optionArea').innerHTML = '';
  hideError();
  setStatus('处理中...');

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, field_name: fieldName, value })
    });
    const data = await res.json();
    if (!data.ok) {
      showError(data.error || '输入有误，请重试');
    } else {
      displayPrompt(data.next_prompt);
      setStatus(`阶段 ${data.next_prompt.phase || '?'} · 步骤 ${(data.next_prompt.step_index||0)+1}/${data.next_prompt.total_steps||'?'}`);
    }
  } catch(e) {
    showError('网络错误，请重试');
  }
}

async function generateSkill() {
  if (!sessionId) return;
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  setStatus('正在生成技能文件...');

  try {
    const res = await fetch(`${API}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
    const data = await res.json();
    if (data.skill_name) {
      generatedSkillName = data.skill_name;
      addMsg('bot', `✅ 技能文件已生成！路径: ${data.skill_path}`);
      document.getElementById('downloadBtn').style.display = 'inline-block';
      setStatus(`技能 "${generatedSkillName}" 已就绪`);
      btn.textContent = '✅ 已生成';
    } else {
      addMsg('bot', `❌ 生成失败: ${data.detail || '未知错误'}`);
      btn.disabled = false;
      btn.textContent = '🚀 生成技能文件';
    }
  } catch(e) {
    addMsg('bot', '生成失败，请重试');
    btn.disabled = false;
    btn.textContent = '🚀 生成技能文件';
  }
}

function downloadSkill() {
  if (!generatedSkillName) return;
  window.location.href = `${API}/api/package/${encodeURIComponent(generatedSkillName)}`;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

init();
</script>
</body>
</html>
